<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Boletos | Apenas Código</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        :root { --gc-bg: #f8fafc; --gc-primary: #34495e; --gc-border: #e2e8f0; }
        body { background-color: var(--gc-bg); font-family: 'Public Sans', sans-serif; color: #475569; margin: 0; }
        .sidebar { width: 80px; position: fixed; left: 0; top: 0; height: 100vh; background: #2c3e50; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 1000; }
        .sidebar button { background: transparent; border: none; color: #94a3b8; width: 60px; height: 60px; font-size: 0.65rem; transition: 0.3s; margin-bottom: 10px; cursor: pointer; }
        .sidebar button.active { background: #34495e; color: #fff; border-radius: 8px; }
        
        .main-content { margin-left: 80px; padding: 25px 40px; }
        .layout-grid { display: grid; grid-template-columns: 420px 1fr; gap: 30px; height: calc(100vh - 150px); }

        .upload-card { background: #fff; border-radius: 12px; border: 1px solid var(--gc-border); padding: 25px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .preview-container { background: #525659; border-radius: 12px; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }

        .zoom-controls { position: sticky; top: 0; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; margin-bottom: 15px; display: flex; gap: 10px; }
        .zoom-controls button { background: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }

        #pdf-render-container { position: relative; }
        #pdf-highlight {
            position: absolute; border: 3px solid #ff0000;
            background: rgba(255, 0, 0, 0.2); pointer-events: none;
            display: none; z-index: 100; border-radius: 4px;
        }

        .barcode-box { background: #f8fafc; border: 2px solid #3498db; border-radius: 8px; padding: 12px; cursor: pointer; }
        .barcode-font { font-family: 'Courier New', monospace; font-weight: 700; font-size: 0.95rem; color: #1e293b; word-break: break-all; }

        .ocr-controls { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        #loader { display: none; text-align: center; padding: 20px; }
        
        .data-label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button onclick="location.reload()"><i class="fa-solid fa-sync"></i> Limpar</button>
        <button class="active"><i class="fa-solid fa-barcode"></i> Leitor</button>
    </div>

    <div class="main-content">
        <div class="mb-3">
            <h3 class="fw-bold">Extrator de Código de Barras</h3>
            <p class="text-muted">Detecção automática e manual via OCR</p>
        </div>

        <div class="layout-grid">
            <div class="upload-card">
                <button class="btn btn-dark w-100 mb-3" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-file-pdf me-2"></i> SELECIONAR PDF
                </button>
                <input type="file" id="fileInput" accept=".pdf" style="display:none">
                
                <div id="loader">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2 small">Processando...</p>
                </div>

                <div id="prefixoArea" style="display:none; margin-bottom: 10px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="data-label">Dados da Planilha</div>
                        <button class="btn btn-link btn-sm text-danger p-0 text-decoration-none fw-bold" style="font-size: 0.6rem;" onclick="removerPrefixo()">[ REMOVER ]</button>
                    </div>
                    <div class="p-2 bg-light border rounded small fw-bold" id="f-prefixo"></div>
                </div>

                <div id="resultArea" style="display:none">
                    <div class="data-label">Resultado Final (Pronto para Cópia)</div>
                    <div class="barcode-box" onclick="copyCode()">
                        <div id="f-barcode" class="barcode-font" style="white-space: pre-wrap;"></div>
                        <div class="text-end mt-1"><small class="text-primary" style="font-size: 0.6rem;">CLIQUE PARA COPIAR TUDO</small></div>
                    </div>
                </div>

                <div id="ocrControls" class="ocr-controls">
                    <div class="alert alert-warning py-2 small">
                        <i class="fa-solid fa-image me-2"></i> Documento sem texto. <b>Selecione o código de barras</b> ao lado para decodificar.
                    </div>
                    <button class="btn btn-primary w-100 fw-bold" onclick="processSelectedArea()">
                        <i class="fa-solid fa-magnifying-glass-plus me-2"></i> DECODIFICAR SELEÇÃO
                    </button>
                </div>
            </div>

            <div class="preview-container">
                <div class="zoom-controls">
                    <button onclick="adjustZoom(-0.2)"><i class="fa-solid fa-minus"></i></button>
                    <button onclick="adjustZoom(0.2)"><i class="fa-solid fa-plus"></i></button>
                    <button onclick="adjustZoom(0, true)"><i class="fa-solid fa-rotate-left"></i></button>
                </div>
                <div id="pdf-render-container">
                    <div id="pdf-highlight"></div>
                    <canvas id="pdf-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let cropper = null;
    let globalViewport = null;
    let globalScale = 1.5;
    let currentPdfPage = null;
    let lastDetectedCode = ""; // Armazena o código para permitir remover o prefixo depois

    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        resetUI();
        document.getElementById('loader').style.display = 'block';

        const reader = new FileReader();
        reader.onload = async function() {
            const pdfData = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(pdfData).promise;
            currentPdfPage = await pdf.getPage(1);
            
            await renderPdf();

            const textContent = await currentPdfPage.getTextContent();
            const items = textContent.items;

            const found = tryAutomaticDetection(items);
            if (found) {
                lastDetectedCode = found.code;
                processAndDisplay(found.code, found.item);
            } else {
                enableManualOCR();
            }
            document.getElementById('loader').style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    };

    async function renderPdf() {
        if (!currentPdfPage) return;
        
        globalViewport = currentPdfPage.getViewport({ scale: globalScale });
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        canvas.height = globalViewport.height;
        canvas.width = globalViewport.width;
        
        await currentPdfPage.render({ canvasContext: context, viewport: globalViewport }).promise;
        
        if (cropper) {
            cropper.destroy();
            enableManualOCR();
        }
    }

    function adjustZoom(delta, reset = false) {
        if (reset) globalScale = 1.5;
        else globalScale = Math.max(0.5, globalScale + delta);
        renderPdf();
    }

    function tryAutomaticDetection(items) {
        const bankRegex = /^(237|001|341|033|104|756|077|422|8)/;
        for (let i = 0; i < items.length; i++) {
            const clean = items[i].str.replace(/\D/g, '');
            if (bankRegex.test(clean) && clean.length >= 10) {
                let code = clean;
                let next = i + 1;
                while(code.length < 44 && next < items.length) {
                    code += items[next].str.replace(/\D/g, '');
                    next++;
                }
                if (code.length >= 44) return { code, item: items[i] };
            }
        }
        return null;
    }

    function processAndDisplay(code, visualItem = null) {
        code = code.replace(/\D/g, '');
        lastDetectedCode = code; // Atualiza a referência global do código numérico
        
        const prefixo = localStorage.getItem('boleto_pendente');
        const campoDestino = document.getElementById('f-barcode');
        
        if (prefixo) {
            const pArea = document.getElementById('prefixoArea');
            if(pArea) {
                pArea.style.display = 'block';
                document.getElementById('f-prefixo').innerText = prefixo;
            }
            campoDestino.innerText = `${prefixo}\n${code}`;
        } else {
            campoDestino.innerText = code;
        }
        
        document.getElementById('resultArea').style.display = 'block';

        // Mantém o destaque visual (Highlight) se as coordenadas forem fornecidas
        if (visualItem) {
            const hl = document.getElementById('pdf-highlight');
            const tx = visualItem.transform;
            hl.style.width = (visualItem.width * globalScale + 20) + 'px';
            hl.style.height = (visualItem.height * globalScale + 10) + 'px';
            hl.style.left = (tx[4] * globalScale - 5) + 'px';
            hl.style.top = (globalViewport.height - (tx[5] * globalScale) - (visualItem.height * globalScale) - 5) + 'px';
            hl.style.display = 'block';
        }
    }

    function removerPrefixo() {
        localStorage.removeItem('boleto_pendente');
        document.getElementById('prefixoArea').style.display = 'none';
        // Re-exibe apenas o código sem limpar o destaque do PDF
        document.getElementById('f-barcode').innerText = lastDetectedCode;
    }

    function enableManualOCR() {
        document.getElementById('ocrControls').style.display = 'block';
        if (cropper) cropper.destroy();
        cropper = new Cropper(document.getElementById('pdf-canvas'), {
            viewMode: 1, autoCrop: false, zoomable: false, ready() { this.cropper.crop(); }
        });
    }

    async function processSelectedArea() {
        if (!cropper) return;
        document.getElementById('loader').style.display = 'block';

        const result = await Tesseract.recognize(cropper.getCroppedCanvas(), 'eng', {
            tessedit_char_whitelist: '0123456789'
        });

        const code = result.data.text.replace(/\D/g, '');
        if (code.length >= 10) {
            processAndDisplay(code);
            document.getElementById('ocrControls').style.display = 'none';
            cropper.destroy(); cropper = null;
        } else {
            alert("Código muito curto ou ilegível. Tente selecionar novamente.");
        }
        document.getElementById('loader').style.display = 'none';
    }

    function resetUI() {
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('ocrControls').style.display = 'none';
        document.getElementById('pdf-highlight').style.display = 'none';
        document.getElementById('prefixoArea').style.display = 'none';
        if (cropper) { cropper.destroy(); cropper = null; }
        globalScale = 1.5;
        lastDetectedCode = "";
    }

    function copyCode() {
        const textoCompleto = document.getElementById('f-barcode').innerText;
        navigator.clipboard.writeText(textoCompleto);
        localStorage.removeItem('boleto_pendente');
        alert("Dados concatenados copiados!");
    }
</script>
</body>
</html>
