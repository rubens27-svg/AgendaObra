<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Obras — Agenda 3</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="config.js"></script>

<style>
:root {
    --ink:      #0f1923;
    --ink2:     #3d5166;
    --ink3:     #7a8fa3;
    --rule:     #e4eaf0;
    --bg:       #f4f7fa;
    --surface:  #ffffff;
    --accent:   #1a6cf6;
    --accent2:  #0d4fbc;
    --danger:   #e0341e;
    --warn-bg:  #fffbec;
    --warn-bd:  #f0b429;
    --ok-bg:    #edfaf3;
    --ok-bd:    #27ae60;
    --side-w:   72px;
    --ff:       'DM Sans', sans-serif;
    --fm:       'DM Mono', monospace;
}

body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    /* Isso acaba com o aspecto serrilhado no Windows: */
    -webkit-font-smoothing: antialiased; 
    -moz-osx-font-smoothing: grayscale;
    font-size: 0.9rem;
}

/* Negrito para tarefas com prioridade */
tr.prioridade td {
    font-weight: 700;
    color: #000; /* Deixa o preto mais forte na prioridade */
}

/* Cursor de "mãozinha" para indicar que a linha é clicável */
#tbody tr {
    cursor: pointer;
}

/* ── Sidebar ─────────────────────────────────── */
.sidebar {
    position: fixed; left: 0; top: 0; height: 100vh; width: var(--side-w);
    background: var(--ink); display: flex; flex-direction: column;
    align-items: center; padding: 18px 0 12px; gap: 4px; z-index: 1000;
}
.sidebar .logo {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 0.85rem; margin-bottom: 12px;
    letter-spacing: -0.5px;
}
.nav-btn {
    width: 52px; height: 52px; background: transparent; border: none;
    border-radius: 10px; color: #7a8fa3; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 0.55rem; font-weight: 500; letter-spacing: 0.3px;
    transition: background .15s, color .15s;
}
.nav-btn i { font-size: 1.25rem; }
.nav-btn:hover  { background: rgba(255,255,255,.08); color: #fff; }
.nav-btn.active { background: var(--accent); color: #fff; }
.nav-btn.danger { color: #f87171; }
.nav-btn.danger:hover { background: rgba(248,113,113,.15); color: #f87171; }
.sidebar-spacer { flex: 1; }

/* ── Layout principal ─────────────────────────── */
.main { margin-left: var(--side-w); min-height: 100vh; display: flex; flex-direction: column; }

/* ── Topbar ───────────────────────────────────── */
.topbar {
    padding: 16px 28px 0;
    display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.topbar-left h1 { margin: 0; font-size: 1.35rem; font-weight: 700; color: var(--ink); }
.topbar-left p  { margin: 2px 0 0; color: var(--ink3); font-size: 0.8rem; }
.status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 500;
    border: 1px solid var(--rule);
}
.status-pill.online  { background: var(--ok-bg);  border-color: var(--ok-bd);  color: #1a7d4e; }
.status-pill.offline { background: #fff3f3; border-color: #f8a0a0; color: #b42020; }
.status-pill.syncing { background: #f0f6ff; border-color: #a0c0f8; color: #1a4fb4; }
.status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

/* ── Filtros ──────────────────────────────────── */
.filters {
    padding: 14px 28px;
    display: flex; align-items: flex-end; flex-wrap: wrap; gap: 10px;
}
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-group label { font-size: 0.7rem; font-weight: 500; color: var(--ink3); text-transform: uppercase; letter-spacing: .4px; }
.filter-group input,
.filter-group select {
    height: 32px; padding: 0 10px; border: 1px solid var(--rule);
    border-radius: 6px; font-family: var(--ff); font-size: 0.82rem;
    color: var(--ink); background: var(--surface); outline: none;
    transition: border .15s;
}
.filter-group input:focus,
.filter-group select:focus { border-color: var(--accent); }
#fTexto { width: 260px; }
.filter-group select { width: 140px; }
.filter-group.date input { width: 140px; }
.btn-clear {
    height: 32px; padding: 0 14px; background: transparent;
    border: 1px solid var(--rule); border-radius: 6px; color: var(--ink3);
    font-family: var(--ff); font-size: 0.8rem; cursor: pointer;
    transition: all .15s; white-space: nowrap;
}
.btn-clear:hover { border-color: var(--ink3); color: var(--ink); }

/* ── Tabela ───────────────────────────────────── */
.table-wrap { flex: 1; padding: 0 28px 32px; }
.table-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }

table { width: 100%; border-collapse: collapse; }
thead th {
    background: #f8fafc; padding: 10px 14px;
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px; color: var(--ink3);
    border-bottom: 1px solid var(--rule); white-space: nowrap; cursor: pointer;
    user-select: none;
}
thead th:hover { color: var(--accent); }
tbody td {
    padding: 9px 14px; border-bottom: 1px solid #f1f5f9;
    vertical-align: middle; font-size: 0.875rem;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbff; }
tbody tr.prioridade td { background: var(--warn-bg) !important; border-left: 3px solid var(--warn-bd); }
tbody tr.prioridade td:not(:first-child) { border-left: none; }

.badge-status {
    display: inline-block; padding: 2px 9px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; border: 1px solid transparent;
}
.badge-pendente  { background: #fff4f0; color: var(--danger);  border-color: #f5b5a8; }
.badge-concluido { background: var(--ok-bg);  color: #1a7d4e; border-color: #9edabc; }

.btn-edit {
    width: 28px; height: 28px; border: 1px solid var(--rule);
    border-radius: 6px; background: transparent; color: var(--ink3);
    cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; justify-content: center;
}
.btn-edit:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.icon-prio { color: var(--warn-bd); font-size: 0.8rem; margin-right: 4px; }
.col-data   { width: 100px; }
.col-obra   { width: 130px; font-weight: 600; }
.col-status { width: 120px; text-align: center; }
.col-act    { width: 44px;  text-align: center; }

.empty-row td { text-align: center; padding: 40px; color: var(--ink3); font-size: 0.85rem; }

/* ── Modal ────────────────────────────────────── */
.modal-content { border: none; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-header  { border-bottom: 1px solid var(--rule); padding: 18px 22px 14px; }
.modal-title   { font-weight: 700; font-size: 1rem; }
.modal-footer  { border-top: 1px solid var(--rule); padding: 12px 22px; }
.modal-body    { padding: 20px 22px; }
label.flabel   { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
                  letter-spacing: .4px; color: var(--ink3); margin-bottom: 5px; }
.form-control, .form-select {
    border: 1px solid var(--rule); border-radius: 7px;
    font-family: var(--ff); font-size: 0.875rem; color: var(--ink);
    padding: 7px 10px; transition: border .15s;
}
.form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,108,246,.1); }

.hist-item {
    padding: 10px 12px; background: #f8fafc; border-radius: 7px;
    border-left: 3px solid var(--rule); margin-bottom: 8px;
}
.hist-item .hist-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.hist-item .hist-date { font-size: 0.7rem; color: var(--accent); font-weight: 600; }
.hist-item .hist-prox { font-size: 0.7rem; background: #f0f4ff; color: var(--accent2); border-radius: 4px; padding: 1px 6px; }
.hist-item .hist-body { font-size: 0.82rem; color: var(--ink2); margin: 0; }
.hist-item .hist-actions { display: flex; gap: 4px; }
.hist-item .hist-actions button { background: transparent; border: none; cursor: pointer; padding: 2px 5px; border-radius: 4px; font-size: 0.75rem; color: var(--ink3); transition: all .15s; }
.hist-item .hist-actions button:hover { background: var(--rule); color: var(--ink); }
.hist-item .hist-actions button.del:hover { background: #fee2e2; color: var(--danger); }
.hist-scroll { max-height: 220px; overflow-y: auto; padding-right: 4px; }

/* Botões de ação na tabela (WhatsApp, Preview) */
.btn-wa  { background: transparent; border: none; cursor: pointer; color: #25D366; padding: 3px 5px; border-radius: 5px; font-size: 1rem; transition: opacity .15s; }
.btn-wa:hover  { opacity: .7; }
.btn-prev { background: transparent; border: none; cursor: pointer; color: var(--accent); padding: 3px 5px; border-radius: 5px; font-size: 1rem; transition: opacity .15s; }
.btn-prev:hover { opacity: .7; }

/* ── Toast ────────────────────────────────────── */
.toast-bar {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: var(--ink); color: #fff; padding: 10px 18px;
    border-radius: 8px; font-size: 0.82rem; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    transform: translateY(20px); opacity: 0;
    transition: all .25s; pointer-events: none;
}
.toast-bar.show { transform: translateY(0); opacity: 1; }
.toast-bar.ok   { background: #1a7d4e; }
.toast-bar.err  { background: var(--danger); }

/* ── Offline badge na tabela ─────────────────── */
.offline-notice {
    margin: 0 28px 10px;
    background: #fff8e6; border: 1px solid var(--warn-bd); border-radius: 8px;
    padding: 9px 14px; font-size: 0.8rem; color: #7a5800;
    display: none; align-items: center; gap: 8px;
}
.offline-notice.show { display: flex; }

/* ── Importação ───────────────────────────────── */
.import-banner {
    margin: 0 28px 10px;
    background: #f0f6ff; border: 1px solid #a0c0f8; border-radius: 8px;
    padding: 9px 14px; font-size: 0.8rem; color: #1a4fb4;
    display: none; align-items: center; gap: 10px;
}
.import-banner.show { display: flex; }
.btn-import {
    padding: 3px 10px; border-radius: 5px; border: 1px solid #1a4fb4;
    background: #1a4fb4; color: #fff; font-size: 0.75rem; cursor: pointer;
    font-family: var(--ff); white-space: nowrap;
}
</style>
</head>

<script>
// ─── Supabase ─────────────────────────────────────────────
const _db = supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_KEY);
// historicoAtual: array em memória manipulado dentro do modal ANTES de salvar
let historicoAtual = [];

// ─── Estado ───────────────────────────────────────────────
let dados       = [];          // fonte em memória
let filtrados   = [];          // depois dos filtros
let ordemCol    = 'data_tarefa';
let ordemDir    = 1;
let isOnline    = false;
let modal;
let _pendingSync = false;      // marcador de itens offline a sincronizar

// ─── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    modal = new bootstrap.Modal(document.getElementById('modalObra'));
    verificarConexao();
    setInterval(verificarConexao, 30000);
    window.addEventListener('online',  () => { verificarConexao(); sincronizarOffline(); });
    window.addEventListener('offline', () => setStatusOnline(false));
});

// ─── Conexão e status ─────────────────────────────────────
async function verificarConexao() {
    try {
        const { error } = await _db.from('agenda').select('id', { count: 'exact', head: true });
        setStatusOnline(!error);
        if (!error && !dados.length) carregarDados();
        if (!error) sincronizarOffline();
    } catch {
        setStatusOnline(false);
        if (!dados.length) carregarLocal();
    }
}

function setStatusOnline(online) {
    isOnline = online;
    const pill = document.getElementById('statusPill');
    if (online) {
        pill.className = 'status-pill online';
        pill.innerHTML = '<span class="dot"></span> Online — Supabase';
        document.getElementById('offlineNotice').classList.remove('show');
    } else {
        pill.className = 'status-pill offline';
        pill.innerHTML = '<span class="dot"></span> Offline';
        document.getElementById('offlineNotice').classList.add('show');
    }
}

// ─── Carregar dados ───────────────────────────────────────
async function carregarDados() {
    try {
        const { data, error } = await _db
            .from('agenda')
            .select('*')
            .order('data_tarefa', { ascending: true });

        if (error) throw error;

        dados = data.map(normalizar);
        salvarLocal(dados);
        renderizar();
        atualizarSubtitulo();
        verificarImportacao();
    } catch (err) {
        console.error('[carregarDados]', err);
        carregarLocal();
    }
}

function carregarLocal() {
    try {
        const raw = localStorage.getItem('crm_agenda');
        if (raw) {
            dados = JSON.parse(raw);
            renderizar();
            atualizarSubtitulo();
            toast('Carregado do cache local', 'ok');
        } else {
            dados = [];
            renderizar();
            toast('Sem dados. Verifique a conexão.', 'err');
        }
    } catch { dados = []; renderizar(); }
}

function salvarLocal(arr) {
    try { localStorage.setItem('crm_agenda', JSON.stringify(arr)); } catch {}
}

// ─── Normalização ─────────────────────────────────────────
function normalizar(row) {
    let hist = row.historico || [];
    if (typeof hist === 'string') { try { hist = JSON.parse(hist); } catch { hist = []; } }
    return {
        id          : row.id,
        data_tarefa : row.data_tarefa || '',
        obra        : row.obra        || '',
        tarefas     : row.tarefas     || '',
        status      : row.status      || 'Pendente',
        prioridade  : !!row.prioridade,
        historico   : Array.isArray(hist) ? hist : []
    };
}

// ─── Renderizar tabela ────────────────────────────────────
function renderizar() {
    const txt    = document.getElementById('fTexto').value.toLowerCase();
    const status = document.getElementById('fStatus').value;
    const de     = document.getElementById('fDe').value;
    const ate    = document.getElementById('fAte').value;

    filtrados = [...dados].filter(r => {
        const passaTxt    = !txt || r.tarefas.toLowerCase().includes(txt) || r.obra.toLowerCase().includes(txt);
        const passaStatus = !status || r.status === status;
        const passaDe     = !de  || r.data_tarefa >= de;
        const passaAte    = !ate || r.data_tarefa <= ate;
        return passaTxt && passaStatus && passaDe && passaAte;
    });

    if (ordemCol) {
        filtrados.sort((a, b) => {
            const va = (a[ordemCol] || '').toString();
            const vb = (b[ordemCol] || '').toString();
            return va < vb ? -ordemDir : va > vb ? ordemDir : 0;
        });
    }

    const tbody = document.getElementById('tbody');

    if (!filtrados.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5"><i class="fa-regular fa-folder-open" style="font-size:1.4rem;margin-bottom:6px;display:block"></i>Nenhum registro encontrado</td></tr>`;
        return;
    }

    tbody.innerHTML = filtrados.map(r => {
        const dataFmt = r.data_tarefa ? r.data_tarefa.split('-').reverse().join('/') : '—';
        const badgeClass = r.status.toLowerCase() === 'concluído' ? 'badge-concluido' : 'badge-pendente';
        const prio = r.prioridade ? `<i class="fa-solid fa-triangle-exclamation icon-prio" title="Prioridade"></i>` : '';
        const idx  = dados.indexOf(r);
        return `<tr class="${r.prioridade ? 'prioridade' : ''}" ondblclick="abrirModal(${idx})" title="Dê um duplo clique para editar">
            <td class="col-data"><span style="font-family:var(--fm);font-size:.8rem">${dataFmt}</span></td>
            <td class="col-obra">${r.obra}</td>
            <td>${prio}${r.tarefas}</td>
            <td class="col-status"><span class="badge-status ${badgeClass}">${r.status}</span></td>
            <td class="col-act" style="white-space:nowrap">
                <button class="btn-wa"   onclick="enviarWhatsApp(${idx})" title="Enviar por WhatsApp"><i class="fa-brands fa-whatsapp"></i></button>
                <button class="btn-prev" onclick="abrirPreview(${idx})"   title="Ver histórico / PDF"><i class="fa-solid fa-file-circle-check"></i></button>
                <button class="btn-edit" onclick="abrirModal(${idx})"     title="Editar"><i class="fa-solid fa-pen" style="font-size:.75rem"></i></button>
            </td>
        </tr>`;
    
    }).join('');
}

function atualizarSubtitulo() {
    const total     = dados.length;
    const pendentes = dados.filter(r => r.status !== 'Concluído').length;
    document.getElementById('subtitulo').textContent = `${total} registros · ${pendentes} pendentes`;
}

// ─── Ordenação ────────────────────────────────────────────
function ordenarPor(col) {
    if (ordemCol === col) ordemDir *= -1;
    else { ordemCol = col; ordemDir = 1; }
    renderizar();
}

// ─── Modal ────────────────────────────────────────────────
function novaObra() {
    document.getElementById('m-id').value        = '';
    document.getElementById('m-data').value      = new Date().toISOString().split('T')[0];
    document.getElementById('m-obra').value      = '';
    document.getElementById('m-tarefa').value    = '';
    document.getElementById('m-status').value    = 'Pendente';
    document.getElementById('m-prio').checked    = false;
    document.getElementById('m-andamento').value = '';
    document.getElementById('m-prox-data').value = '';
    document.getElementById('btnExcluir').style.display = 'none';
    document.getElementById('modalTitulo').textContent  = 'Nova Tarefa';
    historicoAtual = [];
    renderizarHistorico();
    modal.show();
}

function abrirModal(idx) {
    const r = dados[idx];
    if (!r) return;
    document.getElementById('m-id').value        = r.id || '';
    document.getElementById('m-data').value      = r.data_tarefa || '';
    document.getElementById('m-obra').value      = r.obra;
    document.getElementById('m-tarefa').value    = r.tarefas;
    document.getElementById('m-status').value    = r.status;
    document.getElementById('m-prio').checked    = r.prioridade;
    document.getElementById('m-andamento').value = '';
    document.getElementById('m-prox-data').value = '';
    document.getElementById('btnExcluir').style.display = '';
    document.getElementById('modalTitulo').textContent  = `Editar: ${r.obra}`;
    // Clona o histórico para edição local sem afetar o array original
    historicoAtual = JSON.parse(JSON.stringify(r.historico || []));
    renderizarHistorico();
    modal.show();
}

// ─── Andamento / Histórico (manipulação local no modal) ───
function adicionarAndamento() {
    const texto    = document.getElementById('m-andamento').value.trim();
    const proxData = document.getElementById('m-prox-data').value;
    if (!texto) { toast('Descreva o andamento antes de registrar', 'err'); return; }

    const entrada = { data: new Date().toLocaleString('pt-BR'), texto };
    if (proxData) {
        entrada.proximaData = proxData.split('-').reverse().join('/');
        // Atualiza o campo de data da tarefa para a nova data
        document.getElementById('m-data').value = proxData;
    }

    historicoAtual.push(entrada);
    document.getElementById('m-andamento').value = '';
    document.getElementById('m-prox-data').value = '';
    renderizarHistorico();
}

function renderizarHistorico() {
    const lista = document.getElementById('hist-lista');
    if (!historicoAtual.length) {
        lista.innerHTML = `<p class="text-muted" style="font-size:.82rem;margin:0">Nenhum andamento registrado.</p>`;
        return;
    }
    // Exibe do mais recente para o mais antigo
    lista.innerHTML = [...historicoAtual].reverse().map((h, iRev) => {
        const iReal = historicoAtual.length - 1 - iRev; // índice real no array
        return `<div class="hist-item" id="hist-item-${iReal}">
            <div class="hist-meta">
                <span class="hist-date"><i class="fa-regular fa-clock me-1"></i>${h.data}</span>
                <div class="hist-actions">
                    <button onclick="editarHistorico(${iReal})" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button class="del" onclick="removerHistorico(${iReal})" title="Remover"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div id="hist-body-${iReal}">
                <p class="hist-body">${h.texto}</p>
                ${h.proximaData ? `<span class="hist-prox">Prorrogado: ${h.proximaData}</span>` : ''}
            </div>
        </div>`;
    }).join('');
    // Rola para o topo (item mais recente)
    lista.scrollTop = 0;
}

function editarHistorico(idx) {
    const h = historicoAtual[idx];
    document.getElementById(`hist-body-${idx}`).innerHTML = `
        <textarea class="form-control form-control-sm mb-1" id="edit-txt-${idx}" rows="2">${h.texto}</textarea>
        <div class="d-flex gap-2 align-items-center">
            <input type="text" class="form-control form-control-sm" id="edit-prox-${idx}" placeholder="Prorrogar para dd/mm/aaaa" value="${h.proximaData||''}">
            <button class="btn btn-success btn-sm" onclick="confirmarEdicaoHistorico(${idx})" style="white-space:nowrap">Salvar</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="renderizarHistorico()">✕</button>
        </div>`;
}

function confirmarEdicaoHistorico(idx) {
    historicoAtual[idx].texto      = document.getElementById(`edit-txt-${idx}`).value.trim();
    historicoAtual[idx].proximaData = document.getElementById(`edit-prox-${idx}`).value.trim() || undefined;
    renderizarHistorico();
}

function removerHistorico(idx) {
    if (!confirm('Remover este andamento?')) return;
    historicoAtual.splice(idx, 1);
    renderizarHistorico();
}

// ─── Salvar ───────────────────────────────────────────────
async function salvar() {
    const id       = document.getElementById('m-id').value;
    const obra     = document.getElementById('m-obra').value.trim();
    const tarefa   = document.getElementById('m-tarefa').value.trim();

    if (!obra || !tarefa) { toast('Obra e Tarefa são obrigatórios', 'err'); return; }

    // Se há texto no campo de andamento mas não foi registrado, registra agora automaticamente
    const andamentoPendente = document.getElementById('m-andamento').value.trim();
    if (andamentoPendente) {
        const proxData = document.getElementById('m-prox-data').value;
        const entrada  = { data: new Date().toLocaleString('pt-BR'), texto: andamentoPendente };
        if (proxData) {
            entrada.proximaData = proxData.split('-').reverse().join('/');
            document.getElementById('m-data').value = proxData;
        }
        historicoAtual.push(entrada);
    }

    const payload = {
        data_tarefa : document.getElementById('m-data').value || null,
        obra, tarefas: tarefa,
        status      : document.getElementById('m-status').value,
        prioridade  : document.getElementById('m-prio').checked,
        historico   : historicoAtual   // array, não string
    };

    if (isOnline) {
        try {
            let result;
            if (id) {
                result = await _db.from('agenda').update(payload).eq('id', id);
            } else {
                result = await _db.from('agenda').insert([payload]);
            }
            if (result.error) throw result.error;
            toast(id ? 'Atualizado com sucesso' : 'Tarefa criada', 'ok');
            await carregarDados();
            modal.hide();
        } catch (err) {
            console.error(err);
            toast('Erro ao salvar: ' + err.message, 'err');
        }
    } else {
        // Salva localmente com ID temporário
        salvarOffline(id, payload);
        modal.hide();
    }
}

function salvarOffline(id, payload) {
    if (id) {
        const idx = dados.findIndex(r => r.id == id);
        if (idx > -1) dados[idx] = { ...dados[idx], ...payload };
    } else {
        payload.id = '_tmp_' + Date.now();
        dados.push(normalizar(payload));
    }
    salvarLocal(dados);
    _pendingSync = true;
    renderizar();
    toast('Salvo offline. Será sincronizado quando online.', 'ok');
}

// ─── Excluir ──────────────────────────────────────────────
async function excluir() {
    const id = document.getElementById('m-id').value;
    if (!id || !confirm('Excluir este registro permanentemente?')) return;

    if (isOnline) {
        try {
            const { error } = await _db.from('agenda').delete().eq('id', id);
            if (error) throw error;
            toast('Registro excluído', 'ok');
            await carregarDados();
            modal.hide();
        } catch (err) { toast('Erro ao excluir', 'err'); }
    } else {
        dados = dados.filter(r => r.id != id);
        salvarLocal(dados);
        renderizar();
        modal.hide();
        toast('Excluído localmente', 'ok');
    }
}

// ─── Sincronização offline → online ──────────────────────
async function sincronizarOffline() {
    if (!_pendingSync || !isOnline) return;
    // Itens com ID temporário precisam de insert, os com ID real precisam de update
    const tmpItems = dados.filter(r => String(r.id).startsWith('_tmp_'));
    for (const item of tmpItems) {
        const { id, ...rest } = item;
        const { data, error } = await _db.from('agenda').insert([rest]).select();
        if (!error && data) {
            const idx = dados.indexOf(item);
            dados[idx] = normalizar(data[0]);
        }
    }
    salvarLocal(dados);
    _pendingSync = false;
    toast('Dados sincronizados com sucesso', 'ok');
}

async function sincronizar() {
    toast('Sincronizando...', '');
    await verificarConexao();
    if (isOnline) {
        await carregarDados();
        toast('Sincronizado!', 'ok');
    }
}

// ─── Importar Excel ───────────────────────────────────────
async function verificarImportacao() {
    // Só mostra o banner se NÃO houver dados no Supabase ainda
    if (dados.length === 0) {
        try {
            const res = await fetch('/api/importar-agenda');
            if (res.ok) document.getElementById('importBanner').classList.add('show');
        } catch {}
    }
}

async function importarExcel() {
    toast('Importando planilha...', '');
    try {
        const res  = await fetch('/api/importar-agenda');
        const json = await res.json();
        if (!json.ok) throw new Error(json.error);

        const { error } = await _db.from('agenda').upsert(json.dados, { ignoreDuplicates: false });
        if (error) throw error;

        document.getElementById('importBanner').classList.remove('show');
        await carregarDados();
        toast(`${json.total} registros importados!`, 'ok');
    } catch (err) {
        toast('Erro na importação: ' + err.message, 'err');
    }
}

// ─── WhatsApp ─────────────────────────────────────────────
function enviarWhatsApp(idx) {
    const r = dados[idx];
    if (!r) return;
    const hist = r.historico || [];
    let msg = `*HISTÓRICO DE ANDAMENTO*\n\n*Obra:* ${r.obra}\n*Tarefa:* ${r.tarefas}\n${'─'.repeat(30)}\n`;
    if (!hist.length) {
        msg += '_Nenhum andamento registrado._';
    } else {
        [...hist].reverse().forEach(h => {
            msg += `\n*Data:* ${h.data}\n*Relato:* ${h.texto}`;
            if (h.proximaData) msg += `\n*Nova data:* ${h.proximaData}`;
            msg += '\n';
        });
    }
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── Preview / PDF individual ─────────────────────────────
let _previewIdx = -1;
function abrirPreview(idx) {
    _previewIdx = idx;
    const r    = dados[idx];
    const hist = r.historico || [];
    const corpo = document.getElementById('corpoPreview');
    if (!hist.length) {
        corpo.innerHTML = `<p class="text-center text-muted mt-3">Nenhum andamento registrado.</p>`;
    } else {
        corpo.innerHTML = `
            <h6 class="mb-3"><strong>${r.obra}</strong> — ${r.tarefas}</h6>
            <div class="list-group">
            ${[...hist].reverse().map(h => `
                <div class="list-group-item">
                    <small class="text-primary fw-bold">${h.data}</small>
                    <p class="mb-1 mt-1">${h.texto}</p>
                    ${h.proximaData ? `<small class="text-muted">Prorrogado para: ${h.proximaData}</small>` : ''}
                </div>`).join('')}
            </div>`;
    }
    new bootstrap.Modal(document.getElementById('modalPreview')).show();
}

function gerarRelatorioIndividual() {
    if (_previewIdx < 0) return;
    const r    = dados[_previewIdx];
    const hist = r.historico || [];
    const { jsPDF } = window.jspdf;
    const doc  = new jsPDF();
    doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('Relatório de Acompanhamento', 14, 18);
    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    doc.text(`Obra: ${r.obra}`, 14, 28);
    doc.text(`Tarefa: ${r.tarefas}`, 14, 35);
    doc.setDrawColor(200,210,220); doc.line(14, 42, 196, 42);
    doc.autoTable({
        startY: 48,
        head: [['Data', 'Andamento', 'Prorrogado para']],
        body: hist.map(h => [h.data, h.texto, h.proximaData || '—']),
        headStyles: { fillColor: [15,25,35], textColor: [255,255,255], fontSize: 9 },
        bodyStyles: { fontSize: 9 },
        alternateRowStyles: { fillColor: [244,247,250] },
        styles: { overflow: 'linebreak', cellPadding: 3 },
        margin: { left: 14, right: 14 }
    });
    doc.save(`Historico_${r.obra.replace(/\s/g,'_')}.pdf`);
}

// ─── Pendências urgentes ──────────────────────────────────
function abrirPendencias() {
    const hoje = new Date().toISOString().split('T')[0];
    const urg  = dados.filter(r => r.status !== 'Concluído' && r.data_tarefa <= hoje);
    if (!urg.length) { toast('Nenhuma pendência atrasada ou para hoje!', 'ok'); return; }
    let txt = `PENDÊNCIAS ATÉ HOJE (${hoje.split('-').reverse().join('/')}):\n\n`;
    urg.forEach(r => { txt += `• [${r.data_tarefa.split('-').reverse().join('/')}] ${r.obra}: ${r.tarefas}\n`; });
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=Pendencias_Obras&details=${encodeURIComponent(txt)}`, '_blank');
}

// ─── Filtros ──────────────────────────────────────────────
function limparFiltros() {
    document.getElementById('fTexto').value  = '';
    document.getElementById('fStatus').value = 'Pendente';
    document.getElementById('fDe').value     = '';
    document.getElementById('fAte').value    = '';
    renderizar();
}

// ─── PDF ──────────────────────────────────────────────────
function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(15, 25, 35);
    doc.text('Relatório de Obras — Agenda', 14, 15);
    doc.setDrawColor(200, 210, 220);
    doc.line(14, 20, 196, 20);
    doc.autoTable({
        startY: 25,
        head: [['DATA', 'OBRA', 'TAREFA', 'STATUS']],
        body: filtrados.map(r => [
            r.data_tarefa ? r.data_tarefa.split('-').reverse().join('/') : '',
            r.obra.toUpperCase(), r.tarefas, r.status.toUpperCase()
        ]),
        headStyles: { fillColor: [15, 25, 35], textColor: [255,255,255], fontSize: 9 },
        bodyStyles: { fontSize: 9 },
        alternateRowStyles: { fillColor: [244, 247, 250] },
        columnStyles: { 0: { cellWidth: 22 }, 1: { cellWidth: 28 }, 3: { cellWidth: 24 } },
        margin: { left: 14, right: 14 }
    });
    const fy = doc.lastAutoTable.finalY || 30;
    doc.setFontSize(8); doc.setFont('helvetica', 'italic'); doc.setTextColor(160, 160, 160);
    doc.text(`Gerado em ${new Date().toLocaleString('pt-BR')}`, 14, fy + 10);
    doc.save(`Agenda_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
}

function gerarPDFDetalhado() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    let y = 18;

    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(15,25,35);
    doc.text('RELATÓRIO DE PENDÊNCIAS COM HISTÓRICOS', 14, y);
    doc.setDrawColor(200,210,220); doc.line(14, y+3, 196, y+3);
    y += 14;

    if (!filtrados.length) { alert('Filtre os dados antes de gerar o relatório.'); return; }

    const agrupado = filtrados.reduce((acc, r) => {
        if (!acc[r.obra]) acc[r.obra] = [];
        acc[r.obra].push(r);
        return acc;
    }, {});

    for (const obra in agrupado) {
        if (y > 240) { doc.addPage(); y = 18; }
        doc.setFillColor(15,25,35);
        doc.rect(14, y, 182, 10, 'F');
        doc.setTextColor(255,255,255); doc.setFontSize(11); doc.setFont('helvetica','bold');
        doc.text(`OBRA: ${obra.toUpperCase()}`, 17, y + 6.5);
        y += 14;

        agrupado[obra].forEach(r => {
            if (y > 250) { doc.addPage(); y = 18; }
            doc.setFillColor(52,73,94);
            doc.rect(14, y, 182, 7, 'F');
            doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
            doc.text(doc.splitTextToSize(`TAREFA: ${r.tarefas}`, 175)[0], 17, y + 4.5);
            y += 10;

            const hist = r.historico || [];
            if (hist.length) {
                doc.autoTable({
                    startY: y,
                    head: [['Data Registro','Descrição do Andamento','Nova Data']],
                    body: hist.map(h => [h.data||'', h.texto||'', h.proximaData||'—']),
                    theme: 'grid',
                    headStyles: { fillColor:[240,240,240], textColor:[50,50,50], fontStyle:'bold', fontSize:8 },
                    bodyStyles: { fontSize:8.5, textColor:[20,20,20] },
                    styles: { overflow:'linebreak', cellPadding:3 },
                    margin: { left:14, right:14 }
                });
                y = doc.lastAutoTable.finalY + 10;
            } else {
                doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(130,130,130);
                doc.text('Nenhum andamento registrado.', 17, y);
                y += 12;
            }
        });
        y += 4;
    }

    const totalPags = doc.internal.getNumberOfPages();
    for (let i = 1; i <= totalPags; i++) {
        doc.setPage(i);
        doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(160,160,160);
        doc.text(`Página ${i} de ${totalPags} | ${new Date().toLocaleString('pt-BR')}`, 14, 287);
    }
    doc.save(`Relatorio_Detalhado_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
}

// ─── Desconectar ──────────────────────────────────────────
async function desconectar() {
    if (confirm('Encerrar o servidor local?')) {
        try { await fetch('/api/shutdown', { method: 'POST' }); } catch {}
        window.close();
    }
}

// ─── Toast ────────────────────────────────────────────────
function toast(msg, tipo) {
    const el = document.getElementById('toast');
    el.textContent  = msg;
    el.className    = `toast-bar ${tipo} show`;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3200);
}
